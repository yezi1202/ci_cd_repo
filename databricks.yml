# This is a Databricks asset bundle definition for databrickscicd.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databrickscicd
  uuid: 267496ae-c692-44c2-b694-09c8c64b8d41

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: main
  schema:
    description: default

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-62be2a41-bb10.cloud.databricks.com
    variables:
      catalog: main
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-62be2a41-bb10.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/yexiaoye12@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/yexiaoye12@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: yexiaoye12@gmail.com
        level: CAN_MANAGE
