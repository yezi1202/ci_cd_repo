# The main pipeline for databrickscicd

resources:
  pipelines:
    databrickscicd_etl:
      name: databrickscicd_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/databrickscicd_etl"

      libraries:
        - glob:
            include: ../src/databrickscicd_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
